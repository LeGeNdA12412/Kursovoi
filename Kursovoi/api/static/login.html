<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | VioBlack Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body data-page="login">
    <div class="mesh-1"></div>
    <div class="mesh-2"></div>

    <div class="auth-container">
        <div class="glass auth-card">
            <!-- Логотип -->
            <div class="auth-logo">
                <div class="logo-icon">V</div>
                <span class="logo-text">VioBlack Market</span>
            </div>
            
            <!-- Заголовок -->
            <div class="auth-header">
                <h1>Вход в систему</h1>
                <p>Введите учетные данные для доступа к маркетплейсу</p>
            </div>
            
            <!-- Форма -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" placeholder="admin" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary btn-full" id="login-btn">
                    🔐 Войти
                </button>
                
                <div id="login-error" class="form-error"></div>
            </form>
            
            <!-- Ссылка на регистрацию -->
            <div class="auth-footer">
                <span>Нет аккаунта?</span>
                <a href="registr.html">Создать аккаунт</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
