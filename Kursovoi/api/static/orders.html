<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Мои заказы | VioBlack Market</title>
    
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Стили: общие + страница корзины -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    
    <!-- Иконка -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
</head>
<body data-page="orders">
    <!-- Фоновые эффекты -->
    <div class="mesh-1"></div>
    <div class="mesh-2"></div>

    <div id="app">
        <!-- 🔝 Навигация -->
        <nav class="glass nav-bar">
            <div class="logo" id="nav-logo">
                <div class="logo-icon">V</div>
                <span class="logo-text">VioBlack Market</span>
            </div>
            
            <div class="nav-links">
                <button class="nav-link" onclick="window.location.href='/index.html'">🛍️ Магазин</button>
                <a href="/cart.html" class="nav-link">🛒 Корзина</a>
                <button class="nav-link hidden" id="admin-nav" onclick="window.location.href='/index.html#ADMIN'">⚙️ Админ</button>
                <button class="nav-link hidden" id="manager-nav" onclick="window.location.href='/index.html#MANAGER'">📊 Менеджер</button>
                
                <div class="user-pill">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="user-info">
                        <div class="user-name" id="current-username">ИМЯ</div>
                        <div class="user-role" id="current-role">РОЛЬ</div>
                    </div>
                    <button id="logout-btn" class="icon-btn" title="Выйти" aria-label="Выйти">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </nav>

        <!-- 📦 Основной контент -->
        <main class="main-content">
            <div class="cart-container">
                
                <!-- Секция заказов -->
                <section style="width: 100%;">
                    <div class="glass-card">
                        <div class="cart-header">
                            <h1 class="cart-title">📦 Мои заказы</h1>
                            <span class="cart-count" id="orders-count">0 заказов</span>
                        </div>
                        
                        <div id="orders-list" class="cart-items">
                            <div class="loading-spinner">
                                <div class="spinner"></div>
                                <p>Загрузка заказов...</p>
                            </div>
                        </div>
                    </div>
                </section>
                
            </div>
        </main>
        
        <!-- Футер -->
        <footer class="footer">
            <p>&copy; 2024 VioBlack Market. Учебный проект курсовой работы.</p>
        </footer>
    </div>

    <!-- Уведомления -->
    <div id="cart-notification" class="cart-notification hidden"></div>

    <!-- Модальное окно для просмотра заказа -->
    <div id="order-modal" class="modal-overlay hidden" onclick="closeOrderModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeOrderModal()">×</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Скрипты: сначала общие, потом страница заказов -->
    <script src="script.js"></script>
    <script src="orders.js"></script>
</body>
</html>
